<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rune Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style/style.css">
    <link rel="icon" href="./icons/gdlogo.webp">
    <script defer src="./js/main.js"></script>
</head>

<body>
  <div class="page-wrapper">

    <header>
      <img id="logo" src="./icons/runegdps.png">
      
      <div class="header-title">
        <h1>RuneGDPS</h1>
        <h3>Магазин Официального Мерча</h3>
      </div>

      <a href="#" id="cart" title="корзина">
        <img src="./icons/bag.svg">
        <span id="cart-product-counter">0</span>
      </a>
    </header>

    <div id="filter">
      <div class="search-box">
        <input id="search" type="text" placeholder="Поиск...">
        <img src="icons/search.svg" class="search-icon">
      </div>
    </div>

    <main id="catalog">
      карточки товаров
    </main>

  </div>

  <footer class="footer">
    <div class="footer-container">

      <div class="footer-section">
        <h2>RuneGDPS</h2>
        <p>Официальный магазин мерча</p>
      </div>

      <div class="footer-section">
        <h3>Навигация</h3>
        <a href="#">Каталог</a>
        <a href="#">Корзина</a>
        <a href="#">Контакты</a>
      </div>

      <div class="footer-section">
        <h3>Контакты</h3>
        <p>Email: support@runegdps.com</p>
        <p>Telegram: @runegdps</p>
      </div>

    </div>

    <div class="footer-bottom">
      <p>© 2026 RuneGDPS. Все права защищены.</p>
    </div>
  </footer>
</body>
